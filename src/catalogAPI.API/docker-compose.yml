services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_dev
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=SenhaForte@123
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build: ./src/SuaApi
    container_name: minha_api
    ports:
      - "5000:80"
    depends_on:
      - sqlserver

volumes:
  sql_data: